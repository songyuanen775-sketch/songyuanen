<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網站維護中</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            text-align: center;
        }
        .container {
            border: 2px solid #f1c40f;
            padding: 40px;
            border-radius: 15px;
        }
        h1 { font-size: 48px; margin-bottom: 10px; }
        p { font-size: 20px; color: #bdc3c7; }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>主機維護中</h1>
        <p>老闆正在更新系統，請稍後再回來看看！</p>
        <p style="font-size: 14px;">預計恢復時間：晚點再說</p>
    </div>
</body>
</html>
